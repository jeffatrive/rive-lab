<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rive WebGL2 Template</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="controls">
    <label for="arcValue">
      <input type="range" id="arcValue" min="0" max="100" value="0" step="1" />
    </label>
    <button type="button" id="arcBtn">Arc</button>
  </div>
  <canvas id="riveCanvas"></canvas>
  <script src="https://unpkg.com/@rive-app/webgl2@latest"></script>
  <script src="script.js"></script>
</body>
</html>
